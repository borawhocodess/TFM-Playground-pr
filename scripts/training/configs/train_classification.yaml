# Hydra config for classification training
# Run from repo root so dataset.filename paths resolve; or override dataset.filename=

defaults: []

hydra:
  run:
    dir: .  # keep cwd so relative dataset paths work when run from repo root

model:
  num_attention_heads: 6
  embedding_size: 192
  mlp_hidden_size: 768
  num_layers: 6

dataset:
  filename: ./50x3_3_100k_classification.h5
  device: cuda
  batch_size: 1  # match old pretrain_classification.py default
  starting_index: 0

training:
  steps: 100  # match old pretrain_classification.py default
  accumulate_gradients: 1
  dataloader_num_workers: 0  # keep 0 for now
  lr: 1e-4
  epochs: 10000  # match old pretrain_classification.py default
  run_name: nanotabpfn
  resume_from_checkpoint: false
