# Hydra config for regression training
# Run from repo root so dataset.filename paths resolve; or override dataset.filename=

defaults: []

hydra:
  run:
    dir: .

model:
  num_attention_heads: 6
  embedding_size: 192
  mlp_hidden_size: 768
  num_layers: 6

dataset:
  filename: ./50x3_100k_regression.h5
  device: cuda
  batch_size: 50
  starting_index: 0

training:
  steps: 25
  accumulate_gradients: 1
  dataloader_num_workers: 0
  lr: 1e-4
  epochs: 80
  run_name: nanotabpfn_regression
  n_buckets: 100
