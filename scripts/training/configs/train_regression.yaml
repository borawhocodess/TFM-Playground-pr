# Hydra config for regression training
# Run from repo root so dataset.filename paths resolve; or override dataset.filename=

defaults: []

hydra:
  run:
    dir: .

model:
  num_attention_heads: 6
  embedding_size: 192
  mlp_hidden_size: 768
  num_layers: 6

dataset:
  filename: ./50x3_100k_regression.h5
  device: cuda
  batch_size: 1  # match old pretrain_regression.py default
  starting_index: 0

training:
  run_name: null  # null = auto-generated run id
  steps: 100  # match old pretrain_regression.py default
  accumulate_gradients: 1
  dataloader_num_workers: 0
  lr: 1e-4
  epochs: 10000  # match old pretrain_regression.py default
  n_buckets: 100
  resume_from_checkpoint: false
